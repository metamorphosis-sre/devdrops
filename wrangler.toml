name = "devdrops-api"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Custom domain
routes = [
  { pattern = "api.devdrops.run", custom_domain = true },
  { pattern = "devdrops.run/*", zone_name = "devdrops.run" },
  { pattern = "www.devdrops.run/*", zone_name = "devdrops.run" }
]
workers_dev = true

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "devdrops"
database_id = "dc92b44a-7d5e-46f1-b7cc-865328f8d42e"

# R2 Bucket (backups + document storage) — uncomment once R2 is enabled in Cloudflare dashboard
# [[r2_buckets]]
# binding = "STORAGE"
# bucket_name = "devdrops-backups"

# Cloudflare Workers AI
[ai]
binding = "AI"

# KV Namespace (edge cache for hot data)
[[kv_namespaces]]
binding = "CACHE"
id = "7973d723cbf349c2874eece54b651d49"

# Email (send purchase notifications)
[[send_email]]
name = "EMAIL"
destination_address = "pchawla@gmail.com"

# Cron Triggers
[triggers]
crons = [
  "*/30 * * * *",  # Health check — every 30 minutes
  "0 2 * * *",     # Nightly backup — 2:00 AM UTC
]

# Environment variables (non-secret defaults)
[vars]
FACILITATOR_URL = "https://api.cdp.coinbase.com/platform/v2/x402"
NETWORK = "eip155:8453"  # Base mainnet
ENVIRONMENT = "production"
PAY_TO_ADDRESS = "0xc42EAe553c5C2d521d8A0543c265480B380179D2"

# Production overrides
[env.production]
vars = { ENVIRONMENT = "production", NETWORK = "eip155:8453", FACILITATOR_URL = "https://api.cdp.coinbase.com/platform/v2/x402" }

# Secrets (set via `wrangler secret put`):
# PAY_TO_ADDRESS          — your USDC receiving wallet address
# WEATHER_API_KEY          — OpenWeatherMap API key (free tier)
# ODDS_API_KEY             — The Odds API key (free tier / $35/mo)
# COMPANIES_HOUSE_API_KEY  — UK Companies House API key (free)
# ANTHROPIC_API_KEY        — Claude API key (for sentiment, documents, research, signals)
